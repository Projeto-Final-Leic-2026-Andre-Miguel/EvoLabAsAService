upstream backend {
    server backend:8080;
 }

server {
    listen 80; # open port 80 for HTTP traffic
    server_name localhost;

    location / {
        root /usr/share/nginx/html; # this is the default location for static files in nginx
        index index.html;
        try_files $uri $uri/ /index.html; # this is important for single-page applications, it tells nginx to serve index.html for any request that doesn't match a file or directory
    }

    location /api/ { # When requests arrive from the frontend, they will be forwarede to the backend service.

        proxy_pass http://backend/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
     }

    # This is where the OAuth endpoint is listenning : http://localhost:8080/login/oauth2/code/google
    location /login/ {
        proxy_pass http://backend/login/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location /oauth2/ {
        proxy_pass http://backend/oauth2/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }
}
